<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheat-Inspector</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"Ubuntu Mono"', 'monospace'],
                    },
                    colors: {
                        panel: '#111111',
                        border: '#222222',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-item { animation: slideIn 0.3s ease forwards; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-mono select-none overflow-hidden h-screen">
    <div class="p-10 flex flex-col h-full">
        <header>
            <div class="flex gap-4">
                <button id="openRecentBtn" class="border border-white px-8 py-3 font-bold hover:bg-white hover:text-black transition-all duration-300 active:scale-95">
                    Recent
                </button>

                <button id="openCrashDumpsBtn" class="border border-white px-8 py-3 font-bold hover:bg-white hover:text-black transition-all duration-300 active:scale-95">
                    CrashDumps
                </button>

                <button id="openPrefetchBtn" class="border border-white px-8 py-3 font-bold hover:bg-white hover:text-black transition-all duration-300 active:scale-95">
                    Prefetch
                </button>

                <button id="openRecyclesBtn" class="border border-white px-8 py-3 font-bold hover:bg-white hover:text-black transition-all duration-300 active:scale-95">
                    Recycles
                </button>
            </div>
        </header>

        <div class="border-t border-border my-6"></div>

        <main class="flex flex-col flex-grow overflow-hidden">
            <div class="mb-8">
                <button id="scanBtn" class="border border-white px-8 py-3 font-bold hover:bg-white hover:text-black transition-all duration-300 active:scale-95">
                    Запустить проверку
                </button>
            </div>

            <div class="flex-grow overflow-y-auto pr-2">
                <div id="directories" class="text-[11px] text-gray-500 mb-4 tracking-[0.2em] uppercase"></div>
                <ul id="result" class="space-y-2"></ul>
            </div>
        </main>
    </div>
    
    <script src="../js/renderer.js"></script>
</body>
</html>
