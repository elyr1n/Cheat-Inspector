<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheat-Inspector</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"Ubuntu Mono"', 'monospace'],
                    },
                    colors: {
                        panel: '#111111',
                        border: '#222222',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-item { animation: slideIn 0.3s ease forwards; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-mono select-none overflow-hidden h-screen">

    <div class="p-10 flex flex-col h-full">
        <header class="flex justify-between items-baseline border-b border-border pb-6 mb-8">
            <div class="text-2xl font-bold tracking-tighter">
                Cheat<span class="font-normal text-gray-500">-Inspector</span>
            </div>
        </header>

        <main class="flex flex-col flex-grow overflow-hidden">
            <div class="mb-8">
                <button id="scanBtn" class="border border-white px-8 py-3 font-bold hover:bg-white hover:text-black transition-all duration-300 active:scale-95">
                    Запустить
                </button>
            </div>

            <div class="flex-grow overflow-y-auto pr-2">
                <div class="text-[11px] text-gray-500 mb-4 tracking-[0.2em] uppercase">Найденные директории:</div>
                <ul id="result" class="space-y-2"></ul>
            </div>
        </main>
    </div>
    
    <script src="../js/renderer.js"></script>
</body>
</html>
